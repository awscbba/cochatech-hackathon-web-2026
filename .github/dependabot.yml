version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    ignore:
      - dependency-name: lodash
        update-types: ["version-update:semver-patch"]
    groups:
      all-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      major-updates:
        patterns:
          - "*"
        update-types:
          - major

  - package-ecosystem: npm
    directory: /infra
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - infra
    groups:
      all-infra:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - ci
    groups:
      all-actions:
        patterns:
          - "*"
