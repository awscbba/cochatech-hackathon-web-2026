version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      - dependency-name: lodash
        update-types: ["version-update:semver-patch"]
    groups:
      astro:
        patterns:
          - "astro*"
          - "@astrojs/*"
      eslint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"

  - package-ecosystem: npm
    directory: /infra
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - infra

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
